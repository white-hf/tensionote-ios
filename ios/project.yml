name: Tensionote
options:
  bundleIdPrefix: com.tensionote
targets:
  Tensionote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tensionote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tensionote.app
        SWIFT_VERSION: 5.10
        INFOPLIST_FILE: Tensionote/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
    resources:
      - Tensionote/Resources
    info:
      path: Tensionote/Info.plist
      properties:
        CFBundleDisplayName: Tensionote
        CFBundleLocalizations:
          - en
          - zh-Hans
          - hi
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
